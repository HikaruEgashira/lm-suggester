name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
        timeout-minutes: 5

      - name: Set up Go
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.1.0
        timeout-minutes: 5
        with:
          go-version: '1.25'
          cache: true

      - name: Download dependencies
        run: go mod download
        timeout-minutes: 5

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...
        timeout-minutes: 10

      - name: Run vet
        run: go vet ./...
        timeout-minutes: 5

      - name: Build CLI
        run: |
          cd cmd/lm-suggester
          go mod download
          go build -v -o ../../lm-suggester .
        timeout-minutes: 5

      - name: Test CLI
        run: |
          # Test with example data files
          cat _examples/testdata/simple_replacement.json | ./lm-suggester -p
          # Test with file input
          ./lm-suggester -i _examples/testdata/japanese_comment.json
          # Test version command
          ./lm-suggester version
        timeout-minutes: 2

      - name: Install reviewdog
        uses: reviewdog/action-setup@3f401fe1d58fe77e10d665ab713057375e39b887  # v1.3.0
        with:
          reviewdog_version: latest
        timeout-minutes: 2

      - name: Test reviewdog integration
        run: |
          # Test reviewdog flag detection
          ./lm-suggester --help | grep -q "reviewdog"

          # Test with local reporter (safe for CI)
          echo '{"file_path":"test.go","llm_after":"fmt.Println(\"test\")","message":"test"}' | \
            ./lm-suggester --reviewdog --reporter=local --filter-mode=nofilter || true

          # Verify JSON output format is compatible with reviewdog
          cat _examples/testdata/simple_replacement.json | ./lm-suggester | \
            reviewdog -f=rdjson -reporter=local -filter-mode=nofilter || true
        timeout-minutes: 2