name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        go-version: ['1.21', '1.22', '1.23']
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
        timeout-minutes: 5

      - name: Set up Go
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.1.0
        timeout-minutes: 5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download
        timeout-minutes: 5

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...
        timeout-minutes: 10

      - name: Run vet
        run: go vet ./...
        timeout-minutes: 5

      - name: Build CLI
        run: go build -v ./cmd/reviewdog-converter
        timeout-minutes: 5

      - name: Test CLI
        run: |
          # Test with example data files
          cat _examples/testdata/simple_replacement.json | ./reviewdog-converter -p
          # Test with file input
          ./reviewdog-converter -i _examples/testdata/japanese_comment.json
          # Test version command
          ./reviewdog-converter version
        timeout-minutes: 2