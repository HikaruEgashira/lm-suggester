version: 2

before:
  hooks:
    - go mod tidy

builds:
  - skip: true

# No archives for library-only release

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch
  groups:
    - title: 'New Features'
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: 'Bug fixes'
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: 'Performance improvements'
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: 'Others'
      order: 999

release:
  github:
    owner: HikaruEgashira
    name: lm-suggester
  draft: false
  prerelease: auto
  mode: append
  header: |
    ## Installation

    ### Go Module
    ```bash
    go get github.com/HikaruEgashira/lm-suggester@latest
    ```