version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: reviewdog-converter
    main: ./cmd/reviewdog-converter
    binary: reviewdog-converter
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "6"
      - "7"
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
      - -X main.builtBy=goreleaser

archives:
  - id: reviewdog-converter
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch
  groups:
    - title: 'New Features'
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: 'Bug fixes'
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: 'Performance improvements'
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: 'Others'
      order: 999

release:
  github:
    owner: HikaruEgashira
    name: reviewdog-converter
  draft: false
  prerelease: auto
  mode: append
  header: |
    ## Installation

    ### Homebrew (macOS/Linux)
    ```bash
    brew tap HikaruEgashira/tap
    brew install reviewdog-converter
    ```

    ### Go Install
    ```bash
    go install github.com/HikaruEgashira/reviewdog-converter/cmd/reviewdog-converter@latest
    ```

    ### Binary Download
    Download the appropriate binary for your platform from the assets below.

brews:
  - name: reviewdog-converter
    repository:
      owner: HikaruEgashira
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    folder: Formula
    homepage: "https://github.com/HikaruEgashira/reviewdog-converter"
    description: "Convert LLM suggestions to reviewdog JSON format"
    license: "MIT"
    test: |
      system "#{bin}/reviewdog-converter", "version"
    install: |
      bin.install "reviewdog-converter"